<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Login - Catálogo AMBEV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #f0f2f5;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .login-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem 1.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            transition: all 0.2s;
            max-width: 450px;
            width: 100%;
            margin: 2rem auto;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-logo img {
            max-width: 120px;
            height: auto;
            border-radius: 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .login-logo .brand-icon {
            font-size: 3.5rem;
            color: #0d6efd;
            background: #e9ecef;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 0.5rem;
        }
        .form-label {
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #1e2a3a;

        }
        .input-group-text {
            background-color: #f8f9fa;
            border-radius: 2rem 0 0 2rem;
            border-right: none;
        }
        .form-control {
            border-radius: 2rem;
            border: 1px solid #dee2e6;
            padding: 0.7rem 1rem;
            font-size: 1rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.2);
            border-color: #86b7fe;
        }
        .btn-login {
            border-radius: 2rem;
            padding: 0.7rem 1rem;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .btn-login:active {
            transform: scale(0.97);
        }
        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #6c757d;
        }
        @media (max-width: 576px) {
            .login-card {
                margin: 1rem;
                padding: 1.5rem;
            }
            .form-control {
                padding: 0.6rem 0.9rem;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-cup-straw"></i> Catálogo AMBEV
        </span>
        <span class="navbar-text text-white-50 small">
            <i class="bi bi-box-arrow-in-right"></i> Acesso restrito
        </span>
    </div>
</nav>

<div class="container d-flex align-items-center justify-content-center flex-grow-1 py-4">
    <div class="login-card">
        <div class="login-logo">
            <!-- Substitua "logo.jpg" pelo caminho correto da sua imagem, ou use o ícone abaixo -->
            <img src="./logo.jpg" alt="Logo" onerror="this.style.display='none'; this.nextSibling.style.display='inline-block';">
            <i class="bi bi-cup-straw brand-icon" style="display: none;"></i>
            <h4 class= "mt-2 text-primary">Bem-vindo</h4>
            <p class="text-muted small">Faça login para acessar o catálogo</p>
        </div>

        <form id="loginForm" action="#" method="post">
            <div class="mb-3">
                <label for="login" class="form-label"> <i class="bi bi-person-circle"></i>  LOGIN</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="text" class="form-control" id="login" name="login" placeholder="Digite seu usuário" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="senha" class="form-label"><i class="bi bi-key"></i> SENHA</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="senha" name="senha" placeholder="••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100">
                <i class="bi bi-box-arrow-in-right"></i>Entrar
            </button>

            <div class="footer-note">
                <i class="bi bi-shield-lock"></i> Polartica Armazem <br>Idealizado pro Kauan · Executado por Eduarda
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const login = document.getElementById('login').value.trim();
        const senha = document.getElementById('senha').value.trim();
        
        if (login === "ARMAZEM" || senha === "1234") {
           window.location.href = "principal.html";
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
