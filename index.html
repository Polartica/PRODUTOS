<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>
    <!-- Bootstrap 5 + Ícones -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .hero { padding: 3rem 0; }
        .card-btn { transition: transform 0.2s; cursor: pointer; }
        .card-btn:hover { transform: scale(1.03); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-box-seam"></i> Catálogo</span>
        </div>
    </nav>

    <div class="container hero">
        <h2 class="text-center mb-4">Escolha a Categoria</h2>
        <div class="row g-4 justify-content-center">
            <div class="col-sm-4 col-6">
                <div class="card card-btn text-center p-3 h-100" onclick="location.href='./ow.html'">
                    <i class="bi bi-trash display-4 text-warning"></i>
                    <div class="card-body">
                        <h5 class="card-title">DESCARTÁVEL</h5>
                        <p class="card-text text-muted">Embalagens one‑way</p>
                    </div>
                </div>
            </div>
            <div class="col-sm-4 col-6">
                <div class="card card-btn text-center p-3 h-100" onclick="location.href='./rgb.html'">
                    <i class="bi bi-arrow-repeat display-4 text-success"></i>
                    <div class="card-body">
                        <h5 class="card-title">RETORNÁVEL</h5>
                        <p class="card-text text-muted">Embalagens RGB</p>
                    </div>
                </div>
            </div>
            <div class="col-sm-4 col-6">
                <div class="card card-btn text-center p-3 h-100" onclick="location.href='./mkt.html'">
                    <i class="bi bi-shop display-4 text-info"></i>
                    <div class="card-body">
                        <h5 class="card-title">MARKETPLACE</h5>
                        <p class="card-text text-muted">Produtos de mercado</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
