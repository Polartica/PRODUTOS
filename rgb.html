            select.appendChild(opt);
        });

        select.addEventListener('change', function() {
            const cat = this.value;
            const exibir = cat ? filtrados.filter(item => item.categoria === cat) : [];
            const div = document.getElementById('tabela');
            if (exibir.length === 0) {
                div.innerHTML = cat ? '<div class="alert alert-warning">Nenhum produto encontrado.</div>' : '';
                return;
            }
            let html = `<table class="table table-striped table-bordered table-hover align-middle">
                <thead class="table-dark">
                    <tr><th>PRODUTO</th><th>DESCRIÇÃO</th><th>CATEGORIA</th><th>QTD PALLET</th><th>LASTRO</th></tr>
                </thead><tbody>`;
            exibir.forEach(p => {
                html += `<tr>
                    <td>${p.produto}</td>
                    <td>${p.descricao}</td>
                    <td>${p.categoria}</td>
                    <td>${p.qtdPallet || '---'}</td>
                    <td>${p.lastro || '---'}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            div.innerHTML = html;
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
